services:
  runner:
    build: .
    env_file: .env
    environment:
      - RUNNER_NAME=${RUNNER_NAME:-craftbe-runner}
    volumes:
      - npm-cache:/home/runner/.npm           # persist npm tarball cache
      - runner-work:/home/runner/actions-runner/_work  # persist workspace (checkout, node_modules)
    restart: always
    security_opt:
      - seccomp=unconfined  # needed for Chromium sandbox

volumes:
  npm-cache:
  runner-work:
