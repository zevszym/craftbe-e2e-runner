services:
  runner:
    build: .
    env_file: .env
    environment:
      - RUNNER_NAME=${RUNNER_NAME:-craftbe-runner}
    volumes:
      - npm-cache:/home/runner/.npm  # persist npm cache across ephemeral runs
    restart: always
    security_opt:
      - seccomp=unconfined  # needed for Chromium sandbox

volumes:
  npm-cache:
